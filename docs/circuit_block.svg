<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="Segoe UI, Arial, sans-serif" font-size="12">
  <title>Pet Feeder  Block wiring (ESP32-S3)</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#111">Smart Pet Feeder  System wiring (block level)</text>
  <text x="460" y="48" text-anchor="middle" fill="#555" font-size="11">Match GPIOs with PetFeeder.ino  OV2640 parallel bus; HX711 DT=1, SCK=2; Servo signal GPIO18</text>

  <!-- Power -->
  <rect x="40" y="80" width="140" height="70" rx="6" fill="#fff3cd" stroke="#856404" stroke-width="2"/>
  <text x="110" y="105" text-anchor="middle" font-weight="bold">USB 5V</text>
  <text x="110" y="122" text-anchor="middle" font-size="10">(PC / adapter)</text>
  <text x="110" y="138" text-anchor="middle" font-size="10">� ESP32 VIN/5V</text>

  <rect x="40" y="200" width="140" height="85" rx="6" fill="#d1ecf1" stroke="#0c5460" stroke-width="2"/>
  <text x="110" y="228" text-anchor="middle" font-weight="bold">External 5V</text>
  <text x="110" y="246" text-anchor="middle" font-size="10">Servo power only</text>
  <text x="110" y="262" text-anchor="middle" font-size="10">(adequate current)</text>
  <text x="110" y="278" text-anchor="middle" font-size="10">GND P ESP GND</text>

  <rect x="40" y="320" width="140" height="55" rx="6" fill="#e2e3e5" stroke="#333" stroke-width="1.5"/>
  <text x="110" y="348" text-anchor="middle" font-weight="bold">Common GND</text>
  <text x="110" y="366" text-anchor="middle" font-size="10">Star / short leads</text>

  <!-- ESP32 -->
  <rect x="320" y="200" width="200" height="220" rx="8" fill="#e7f1ff" stroke="#004085" stroke-width="2.5"/>
  <text x="420" y="232" text-anchor="middle" font-size="15" font-weight="bold">ESP32-S3</text>
  <text x="420" y="255" text-anchor="middle" font-size="10">Wi-Fi / CPU</text>
  <text x="335" y="285" font-size="10" fill="#333">" Camera D0D7, VSYNC, HREF,</text>
  <text x="335" y="300" font-size="10">  PCLK, SIOD, SIOC (see code)</text>
  <text x="335" y="320" font-size="10">" HX711: DT�GPIO1, SCK�GPIO2</text>
  <text x="335" y="340" font-size="10">" Servo PWM � GPIO18</text>
  <text x="335" y="360" font-size="10">" 3.3V logic supply (on-board)</text>
  <text x="335" y="385" font-size="10">" WebServer :80</text>

  <!-- Camera module -->
  <rect x="600" y="70" width="260" height="130" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="730" y="98" text-anchor="middle" font-weight="bold">OV2640 module</text>
  <text x="610" y="118" font-size="10">Parallel + SCCB to ESP (digital).</text>
  <text x="610" y="135" font-size="10">PWDN/RESET: per board (code -1).</text>
  <text x="610" y="152" font-size="10">JPEG out � software decode � EI.</text>
  <line x1="520" y1="240" x2="600" y2="140" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="555" y="175" font-size="9" fill="#004085">parallel + I�C-like</text>

  <!-- HX711 -->
  <rect x="600" y="240" width="260" height="100" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="730" y="268" text-anchor="middle" font-weight="bold">HX711 breakout</text>
  <text x="610" y="288" font-size="10">VCC 3.3V � GND � DT�SCK � ESP</text>
  <text x="610" y="305" font-size="10">E+ E- A+ A- � load cell (4-wire)</text>
  <line x1="520" y1="310" x2="600" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Load cell -->
  <rect x="600" y="370" width="260" height="70" rx="6" fill="#f8f9fa" stroke="#666" stroke-width="1.5"/>
  <text x="730" y="398" text-anchor="middle" font-weight="bold">Load cell (bridge)</text>
  <text x="610" y="418" font-size="10">Analog bridge � HX711 ADC</text>
  <line x1="730" y1="340" x2="730" y2="370" stroke="#666" stroke-width="1.5"/>

  <!-- Servo -->
  <rect x="600" y="470" width="260" height="100" rx="6" fill="#fff" stroke="#c00" stroke-width="2"/>
  <text x="730" y="498" text-anchor="middle" font-weight="bold">Servo (gate)</text>
  <text x="610" y="518" font-size="10">Signal: GPIO18 (PWM ~50 Hz)</text>
  <text x="610" y="535" font-size="10">V+ : external 5V � GND : common</text>
  <line x1="520" y1="380" x2="680" y2="500" stroke="#c00" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="455" font-size="9" fill="#c00">PWM</text>

  <!-- Wires from power to ESP -->
  <line x1="180" y1="115" x2="320" y2="260" stroke="#856404" stroke-width="2"/>
  <text x="230" y="200" font-size="9" fill="#856404">5V�board</text>
  <line x1="180" y1="242" x2="320" y2="400" stroke="#0c5460" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="240" y="340" font-size="9" fill="#0c5460">Servo 5V (not MCU pin)</text>
  <line x1="180" y1="347" x2="360" y2="400" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="347" x2="600" y2="530" stroke="#333" stroke-width="1.5"/>

  <text x="40" y="600" font-size="10" fill="#555">Note: Digital at MCU  Camera D�/sync/PCLK/SCCB; HX711 DT/SCK; Servo PWM. Analog only inside load cell + HX711 front-end.</text>
  <text x="40" y="618" font-size="10" fill="#555">For formal schematic, redraw in KiCad/Fritzing with exact part symbols and decoupling capacitors per datasheet.</text>
</svg>
